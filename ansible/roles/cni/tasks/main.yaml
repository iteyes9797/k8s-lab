- name: CNI - Calico 매니페스트 다운로드
  ansible.builtin.get_url:
    url: "{{ calico_manifest_url }}"
    dest: /tmp/calico.yaml
    mode: "0644"
  when: inventory_hostname == groups['masters'][0]

- name: CNI - Calico Pod CIDR 및 VXLAN 최적화 치환
  ansible.builtin.shell: |
    # 1. Pod CIDR 치환 (기본값 192.168.0.0/16을 사용자 정의 CIDR로 변경)
    sed -i 's@192.168.0.0/16@{{ pod_network_cidr }}@g' /tmp/calico.yaml
    
    # 2. Azure 라우팅 이슈 해결을 위한 VXLAN 모드 활성화 및 IPIP 비활성화
    # IP-in-IP 모드를 Never로 변경
    sed -i 's/name: CALICO_IPV4POOL_IPIP/name: CALICO_IPV4POOL_IPIP\n              value: "Never"/g' /tmp/calico.yaml
    # VXLAN 모드를 Always로 변경
    sed -i 's/name: CALICO_IPV4POOL_VXLAN/name: CALICO_IPV4POOL_VXLAN\n              value: "Always"/g' /tmp/calico.yaml

    # 3. Azure 환경을 위한 MTU 1400 설정 강제 삽입 (VXLAN 전용 MTU 설정)
    # FELIX_VXLANMTU 설정이 없으면 추가합니다.
    if ! grep -q "FELIX_VXLANMTU" /tmp/calico.yaml; then
      # CALICO_IPV4POOL_VXLAN 설정 아래에 MTU 값을 삽입합니다.
      sed -i '/name: CALICO_IPV4POOL_VXLAN/a \            - name: FELIX_VXLANMTU\n              value: "1400"' /tmp/calico.yaml
    fi
  when: inventory_hostname == groups['masters'][0]
  become: true

- name: CNI - Calico 적용
  ansible.builtin.shell: |
    until kubectl --kubeconfig=/etc/kubernetes/admin.conf --insecure-skip-tls-verify get nodes; do
      sleep 5
    done

    kubectl apply -f /tmp/calico.yaml \
      --kubeconfig=/etc/kubernetes/admin.conf \
      --validate=false \
      --insecure-skip-tls-verify
  when: inventory_hostname == groups['masters'][0]
  become: true
  register: cni_result
  failed_when: false 

- name: CNI - 노드 상태 확인 대기 (마스터가 Ready 될 때까지만)
  ansible.builtin.shell: |
    kubectl get nodes --kubeconfig=/etc/kubernetes/admin.conf --insecure-skip-tls-verify | grep "{{ inventory_hostname }}"
  register: node_status
  until: "' Ready' in node_status.stdout"
  retries: 20
  delay: 10
  when: inventory_hostname == groups['masters'][0]
  become: true

- name: CNI - 마스터 서비스 재시작
  ansible.builtin.shell: "systemctl restart crio kubelet"
  when: inventory_hostname in groups['masters']
  become: true

- name: CNI - 최종 노드 상태 출력
  ansible.builtin.command: "kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes"
  register: final_nodes
  when: inventory_hostname == groups['masters'][0]
  ignore_errors: true

- name: CNI - 클러스터 상태 확인 결과
  ansible.builtin.debug:
    var: final_nodes.stdout_lines
  when: 
    - inventory_hostname == groups['masters'][0]
    - final_nodes.rc == 0