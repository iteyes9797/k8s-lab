---
# 1. Kubernetes 초기화 여부 확인
- name: 마스터 - 쿠버네티스 초기화 여부 확인
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kube_admin_conf
  become: true

- name: 마스터 - 실패한 이전 시도의 흔적 삭제 (미설치 노드 대상)
  ansible.builtin.command: kubeadm reset -f
  when: not kube_admin_conf.stat.exists
  ignore_errors: true
  become: true

- name: 마스터 - 잔류 디렉토리 강제 정리
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/cni/net.d
    - /var/lib/etcd
    - /etc/kubernetes/pki
    - /etc/kubernetes/manifests
  when: not kube_admin_conf.stat.exists
  become: true

# 2. kubeadm-config.yaml 템플릿 배포
- name: 마스터 - kubeadm 설정 파일 템플릿 배포
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: /tmp/kubeadm-config.yaml
  when: not kube_admin_conf.stat.exists
  notify: restart kubelet

# 3. 클러스터 초기화
- name: 마스터 - 쿠버네티스 클러스터 초기화 실행
  ansible.builtin.command: >
    kubeadm init 
    --config /tmp/kubeadm-config.yaml 
    --upload-certs
  register: init_output
  when: 
    - not kube_admin_conf.stat.exists
    - inventory_hostname == groups['masters'][0]
  become: true
  notify: 
    - restart crio
    - restart kubelet

# 4. 관리자용 kubeconfig 설정
- name: 마스터 - .kube 디렉토리 보장
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: 마스터 - 사용자 환경에 kubeconfig 배포
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
  when: kube_admin_conf.stat.exists or (init_output is defined and not init_output.failed)
  become: true

# 5. 조인 토큰 및 인증서 키 추출
- name: 마스터 - 클러스터 합류 정보 추출 및 전 노드 공유
  block:
    - name: 마스터 - 조인 명령어 생성
      ansible.builtin.shell: |
        kubeadm --kubeconfig=/etc/kubernetes/admin.conf token create --print-join-command
      register: join_command_raw

    - name: 마스터 - 인증서 키 추출 (정밀 파싱)
      ansible.builtin.shell: |
        kubeadm --kubeconfig=/etc/kubernetes/admin.conf init phase upload-certs --upload-certs | grep -v "upload-certs" | tail -n 1
      register: cert_key_raw

    - name: 마스터 - 추출된 정보를 모든 노드에 강제 주입
      ansible.builtin.set_fact:
        kubernetes_join_command: "{{ join_command_raw.stdout.strip() }}"
        kubernetes_certificate_key: "{{ cert_key_raw.stdout.strip() }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      with_items: "{{ groups['all'] }}"
  when: inventory_hostname == groups['masters'][0]
  run_once: true
  become: true