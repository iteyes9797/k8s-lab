---
# 1) Calico 매니페스트 다운로드 (master01 only)
- name: CNI - Calico 매니페스트 다운로드
  ansible.builtin.get_url:
    url: "{{ calico_manifest_url }}"
    dest: /tmp/calico.yaml
    mode: "0644"
  when: inventory_hostname == groups['masters'][0]
  become: true

# 2) Calico Pod CIDR을 클러스터 설정과 맞게 치환
- name: CNI - Calico Pod CIDR 치환 (192.168.0.0/16 → {{ pod_network_cidr }})
  ansible.builtin.replace:
    path: /tmp/calico.yaml
    regexp: "192\\.168\\.0\\.0/16"
    replace: "{{ pod_network_cidr }}"
  when: inventory_hostname == groups['masters'][0]
  become: true

# 3) Calico 적용
- name: CNI - Calico 매니페스트 적용
  ansible.builtin.shell: |
    kubectl apply -f /tmp/calico.yaml
  args:
    executable: /bin/bash
  when: inventory_hostname == groups['masters'][0]
  changed_when: "'created' in ansible_shell_result.stdout or 'configured' in ansible_shell_result.stdout"
  become: true
  register: ansible_shell_result
