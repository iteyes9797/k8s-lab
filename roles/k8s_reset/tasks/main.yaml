---
- name: Reset - kubeadm reset (가능하면 강제)
  ansible.builtin.shell: |
    kubeadm reset -f || true
  args:
    executable: /bin/bash
  become: true
  changed_when: false

- name: Reset - Kubernetes 디렉터리 정리
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/kubernetes
    - /var/lib/etcd
    - /var/lib/kubelet
    - /etc/cni
    - /opt/cni
  become: true

- name: Reset - CNI 네트워크 인터페이스 정리
  ansible.builtin.shell: |
    set -o pipefail
    ip link delete cni0 2>/dev/null || true
    ip link delete flannel.1 2>/dev/null || true
    ip link delete tunl0 2>/dev/null || true
    for i in $(ip -o link show | awk -F': ' '{print $2}' | grep -E '^cali|^vxlan.calico'); do
      ip link delete "$i" 2>/dev/null || true
    done
  args:
    executable: /bin/bash
  become: true
  changed_when: false

- name: Reset - iptables rules 정리
  ansible.builtin.shell: |
    iptables -F || true
    iptables -t nat -F || true
    iptables -t mangle -F || true
    iptables -X || true
    iptables -t nat -X || true
    iptables -t mangle -X || true

    ip6tables -F 2>/dev/null || true
    ip6tables -t nat -F 2>/dev/null || true
    ip6tables -t mangle -F 2>/dev/null || true
    ip6tables -X 2>/dev/null || true
    ip6tables -t nat -X 2>/dev/null || true
    ip6tables -t mangle -X 2>/dev/null || true
  args:
    executable: /bin/bash
  become: true
  changed_when: false

- name: Reset - kubelet 서비스 재기동
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
    enabled: true
  become: true
