# ==============================================================================
# [정적 인벤토리 템플릿]
# 이 파일은 Terraform 실행 결과(IP)를 수동 인벤토리 파일로 생성할 때 사용합니다.
# 현재는 'Azure Dynamic Inventory(azure_rm.yaml)'를 사용하므로 이 방식은 비활성화 상태입니다.
# 다시 사용하려면 Root main.tf에서 'local_file' 리소스의 주석을 해제하세요.
# ==============================================================================
[masters]
k8s-master01 ansible_host=
k8s-master02 ansible_host=
k8s-master03 ansible_host=

[workers]
k8s-worker01 ansible_host=
k8s-worker02 ansible_host=

[nfs]
nfs ansible_host=

[lb]
lb-proxy ansible_host=

[all:vars]
ansible_user=azureuser
#ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3

ansible_ssh_common_args='-o ProxyJump=azureuser@20.249.13.13'